<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scientific Databases & Knowledge Repositories</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #F5F3EF;
  color: #2C2C2C;
  font-family: 'EB Garamond', Georgia, serif;
  min-height: 100vh;
  position: relative;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,0.02) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
}

.orb {
  position: fixed; border-radius: 50%; pointer-events: none; z-index: 0;
}
.orb1 {
  width: 500px; height: 500px; top: -200px; right: -200px;
  background: radial-gradient(circle, rgba(79,195,247,0.03) 0%, transparent 70%);
}
.orb2 {
  width: 400px; height: 400px; bottom: -100px; left: -100px;
  background: radial-gradient(circle, rgba(102,187,106,0.02) 0%, transparent 70%);
}

.wrap {
  position: relative; z-index: 1;
  max-width: 1280px; margin: 0 auto; padding: 0 16px 80px;
}

/* ── BACK LINK ── */
.back-link {
  display: inline-flex; align-items: center; gap: 8px;
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: #666; text-decoration: none;
  margin: 24px 0; padding: 6px 14px;
  border: 1px solid rgba(0,0,0,0.1); border-radius: 6px;
  transition: all 0.2s;
}
.back-link:hover { color: #333; border-color: rgba(0,0,0,0.2); }

/* ── HEADER ── */
.header { text-align: center; padding: 32px 0 32px; }

.eyebrow {
  display: inline-block;
  font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase;
  color: #0066CC; margin-bottom: 16px;
  background: rgba(0,102,204,0.08); padding: 4px 16px; border-radius: 20px;
  border: 1px solid rgba(0,102,204,0.2);
  font-family: 'JetBrains Mono', monospace;
}

h1 {
  font-size: clamp(28px, 5vw, 50px); font-weight: 400;
  letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 12px;
  background: linear-gradient(135deg, #1A1A1A 0%, #0066CC 50%, #2D7D3C 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.header-sub {
  color: #666; font-size: 16px; max-width: 540px;
  margin: 0 auto 32px; line-height: 1.6; font-style: italic;
}

/* ── STATS ── */
.stats { display: flex; justify-content: center; gap: 24px; flex-wrap: wrap; margin-bottom: 8px; }

.stat {
  text-align: center;
  background: rgba(0,0,0,0.03);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 12px; padding: 10px 20px;
}
.stat-value { font-size: 24px; font-weight: 700; color: #0066CC; line-height: 1; }
.stat-label {
  font-size: 11px; color: #777; margin-top: 2px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
}

/* ── CONTROLS ── */
.controls {
  background: rgba(0,0,0,0.03);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 16px; padding: 20px 24px; margin-bottom: 28px;
}

.controls-row {
  display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 14px;
}

.search-wrap { flex: 1 1 240px; position: relative; }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  font-size: 14px; color: #999; pointer-events: none;
}

input[type="text"] {
  width: 100%;
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px; padding: 10px 12px 10px 34px;
  color: #2C2C2C; font-size: 14px; outline: none;
  font-family: 'JetBrains Mono', monospace;
}

input[type="text"]::placeholder {
  color: #999;
}

select {
  flex: 1 1 180px;
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.1);
  border-radius: 10px; padding: 10px 12px;
  color: #2C2C2C; font-size: 13px; outline: none; cursor: pointer;
  font-family: 'JetBrains Mono', monospace;
}

.view-toggle {
  display: flex; gap: 4px;
  background: rgba(0,0,0,0.04); border-radius: 8px; padding: 3px;
  flex-shrink: 0;
}

.view-btn {
  background: none; border: 1px solid transparent;
  border-radius: 6px; padding: 6px 12px;
  color: #777; font-size: 12px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
  transition: all 0.15s;
}
.view-btn.active {
  background: rgba(0,102,204,0.15);
  border-color: rgba(0,102,204,0.3);
  color: #0066CC;
}

/* ── FIELD PILLS ── */
.pills { display: flex; gap: 6px; flex-wrap: wrap; }

.pill {
  background: rgba(0,0,0,0.03);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 20px; padding: 4px 10px;
  color: #777; font-size: 11px; cursor: pointer;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em;
  display: inline-flex; align-items: center; gap: 5px;
  transition: all 0.15s;
}
.pill:hover { color: #444; border-color: rgba(0,0,0,0.15); }

.pill-dot {
  width: 6px; height: 6px; border-radius: 50%;
  flex-shrink: 0; transition: background 0.15s;
}

/* ── FIELD GROUP ── */
.field-group { margin-bottom: 40px; }

.field-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
}

.field-dot-large { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

.field-name {
  font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
  text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
  margin: 0;
}

.field-count {
  font-size: 11px; color: #888;
  background: rgba(0,0,0,0.04);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 10px; padding: 2px 8px;
  font-family: 'JetBrains Mono', monospace;
}

.field-line { flex: 1; height: 1px; }

/* ── GRID / LIST ── */
.db-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.db-list { display: flex; flex-direction: column; gap: 8px; }

/* ── DB CARD ── */
.db-card {
  border-radius: 14px; padding: 18px;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid rgba(0,0,0,0.08);
  background: rgba(255,255,255,0.5);
  position: relative;
}
.db-card:hover {
  background: rgba(255,255,255,0.8);
  border-color: rgba(0,0,0,0.12);
}
.db-card.selected { border-color: rgba(0,102,204,0.35); background: rgba(0,102,204,0.05); }

.db-list .db-card {
  display: flex; align-items: flex-start; gap: 20px;
  padding: 16px 20px; border-radius: 10px;
}

.card-left { flex: 0 0 200px; }
.card-right { flex: 1; }

/* Card header row */
.card-top {
  display: flex; justify-content: space-between;
  align-items: flex-start; margin-bottom: 8px; gap: 8px;
}

.card-name {
  font-size: 14px; font-weight: 600; color: #1A1A1A; line-height: 1.3;
}
.card-subfield {
  font-size: 11px; color: #777;
  font-family: 'JetBrains Mono', monospace; margin-top: 3px; letter-spacing: 0.03em;
}

/* Access badges */
.badge {
  font-size: 10px; padding: 3px 8px; border-radius: 8px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
  border: 1px solid; flex-shrink: 0; white-space: nowrap;
}
.badge-free     { background: #E8F5E9; color: #2E7D32; border-color: rgba(46,125,50,0.35); }
.badge-freemium { background: #E3F2FD; color: #1565C0; border-color: rgba(21,101,192,0.3); }
.badge-paid     { background: #FFEBEE; color: #C62828; border-color: rgba(198,40,40,0.3); }
.badge-inst     { background: #FFF3E0; color: #E65100; border-color: rgba(230,81,0,0.3); }

/* Expanded detail */
.card-detail { display: none; margin-top: 12px; }
.db-card.selected .card-detail { display: block; }

.card-desc {
  font-size: 13px; color: #555; line-height: 1.65;
  font-style: italic; margin-bottom: 10px;
}
.card-org {
  font-size: 11px; color: #777; margin-bottom: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.card-link {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; text-decoration: none;
  border: 1px solid; border-radius: 6px; padding: 4px 10px;
  font-family: 'JetBrains Mono', monospace; transition: filter 0.15s;
}
.card-link:hover { filter: brightness(0.9); }

/* Tags */
.card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
.tag {
  font-size: 10px; padding: 2px 7px; border-radius: 6px;
  background: rgba(0,0,0,0.04); color: #666;
  border: 1px solid rgba(0,0,0,0.08);
  font-family: 'JetBrains Mono', monospace;
}

.expand-hint {
  margin-top: 8px; font-size: 11px; color: #999; font-style: italic;
}

/* Empty */
.empty {
  text-align: center; padding: 80px 0;
  color: #999; font-size: 16px; font-style: italic;
}

/* Footer */
.page-footer {
  text-align: center; margin-top: 60px;
  border-top: 1px solid rgba(0,0,0,0.08); padding-top: 24px;
  color: #999; font-size: 11px;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.08em;
}

@media (max-width: 600px) {
  .db-grid { grid-template-columns: 1fr; }
  .db-list .db-card { flex-direction: column; gap: 12px; }
  .card-left { flex: none; }
}
</style>
</head>

<div class="wrap">

  <a href="index.html" class="back-link">← Back to Home</a>

  <!-- HEADER -->
  <div class="header">

    <div class="pills" id="pills-wrap"></div>
  </div>

  <!-- RESULTS -->
  <div id="results"></div>

  <div class="page-footer" id="page-footer"></div>

</div>

// ─── FIELD COLOURS ────────────────────────────────────────────────────────[...]
const fieldColors = {
  "Genomics & Genetics":        {accent:"#0066CC", dot:"#0066CC", rgb:"0,102,204"},
  "Proteomics":                 {accent:"#7B2CBF", dot:"#7B2CBF", rgb:"123,44,191"},
  "Chemistry":                  {accent:"#00B4A6", dot:"#00B4A6", rgb:"0,180,166"},
  "Botany & Plant Biology":     {accent:"#2D7D3C", dot:"#2D7D3C", rgb:"45,125,60"},
  "Neuroscience":               {accent:"#D97706", dot:"#D97706", rgb:"217,119,6"},
  "Pharmacology":               {accent:"#C2185B", dot:"#C2185B", rgb:"194,24,91"},
  "Epigenomics":                {accent:"#0097A7", dot:"#0097A7", rgb:"0,151,167"},
  "Metabolomics":               {accent:"#F57F17", dot:"#F57F17", rgb:"245,127,23"},
  "Transcriptomics":            {accent:"#1565C0", dot:"#1565C0", rgb:"21,101,192"},
  "Cancer Biology":             {accent:"#E53935", dot:"#E53935", rgb:"229,57,53"},
  "Microbiology & Virology":    {accent:"#512DA8", dot:"#512DA8", rgb:"81,45,168"},
  "Clinical & Health":          {accent:"#2E7D32", dot:"#2E7D32", rgb:"46,125,50"},
  "Immunology":                 {accent:"#E64A19", dot:"#E64A19", rgb:"230,74,25"},
  "Literature & Multidisciplinary":{accent:"#616161", dot:"#616161", rgb:"97,97,97"},
  "Ecology & Environment":      {accent:"#689F38", dot:"#689F38", rgb:"104,159,56"},
  "Structural Biology":         {accent:"#0288D1", dot:"#0288D1", rgb:"2,136,209"},
  "Agriculture & Food Science": {accent:"#F57C00", dot:"#F57C00", rgb:"245,124,0"}
};

const accessBadge = {
  "Free":                  {cls:"badge-free",    label:"Free"},
  "Free (basic) / Paid":   {cls:"badge-freemium",label:"Freemium"},
  "Free (research) / Paid":{cls:"badge-freemium",label:"Freemium"},
  "Paid":                  {cls:"badge-paid",    label:"Paid"},
  "Institutional":         {cls:"badge-inst",    label:"Institutional"}
};

// ─── STATE ──────────────────────────────────────────────────────────[...]
let searchVal = '';
let fieldFilter = '';
let accessFilter = '';
let viewMode = 'grid';
let selectedId = null;

// ─── INIT ────────────────────────────────────────────────────────────[...]
const fields = [...new Set(databases.map(d => d.field))];
const freeCount = databases.filter(d => d.access === 'Free').length;

document.getElementById('stat-free').textContent = freeCount;
document.getElementById('stat-fields').textContent = fields.length;

// Populate field select
const fieldSelect = document.getElementById('field-select');
fields.forEach(f => {
  const o = document.createElement('option');
  o.value = f; o.textContent = f;
  fieldSelect.appendChild(o);
});

// Build pills
const pillsWrap = document.getElementById('pills-wrap');

function buildPills() {
  pillsWrap.innerHTML = '';
  // All pill
  const allPill = document.createElement('button');
  allPill.className = 'pill' + (fieldFilter === '' ? ' active' : '');
  allPill.innerHTML = `<span class="pill-dot" style="background:${fieldFilter===''?'#0066CC':'#999'}"></span>All`;
  allPill.onclick = () => { fieldFilter = ''; fieldSelect.value = ''; render(); buildPills(); };
  pillsWrap.appendChild(allPill);

  fields.forEach(f => {
    const c = fieldColors[f] || {accent:'#666', dot:'#666', rgb:'102,102,102'};
    const active = fieldFilter === f;
    const p = document.createElement('button');
    p.className = 'pill' + (active ? ' active' : '');
    p.style.cssText = active
      ? `color:${c.accent};background:rgba(${c.rgb},0.12);border-color:rgba(${c.rgb},0.4)`
      : '';
    p.innerHTML = `<span class="pill-dot" style="background:${active ? c.dot : '#999'}"></span>${f.split(' & ')[0]}`;
    p.onclick = () => {
      fieldFilter = active ? '' : f;
      fieldSelect.value = fieldFilter;
      selectedId = null;
      render(); buildPills();
    };
    pillsWrap.appendChild(p);
  });
}
buildPills();

// ─── EVENTS ──────────────────────────────────────────────────────────[...]
document.getElementById('search').addEventListener('input', e => {
  searchVal = e.target.value;
  selectedId = null;
  render();
  document.getElementById('stat-showing').textContent = getFiltered().length;
});

fieldSelect.addEventListener('change', e => {
  fieldFilter = e.target.value;
  selectedId = null;
  render(); buildPills();
});

document.getElementById('access-select').addEventListener('change', e => {
  accessFilter = e.target.value;
  selectedId = null;
  render();
});

document.getElementById('btn-grid').addEventListener('click', () => {
  viewMode = 'grid';
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  render();
});

document.getElementById('btn-list').addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
  render();
});

// ─── FILTER ──────────────────────────────────────────────────────────[...]
function getFiltered() {
  const s = searchVal.toLowerCase();
  return databases.filter(db => {
    const matchSearch = !s ||
      db.name.toLowerCase().includes(s) ||
      db.description.toLowerCase().includes(s) ||
      db.field.toLowerCase().includes(s) ||
      db.subfield.toLowerCase().includes(s) ||
      db.tags.some(t => t.toLowerCase().includes(s)) ||
      (db.org && db.org.toLowerCase().includes(s));
    const matchField = !fieldFilter || db.field === fieldFilter;
    const matchAccess = !accessFilter || db.access === accessFilter;
    return matchSearch && matchField && matchAccess;
  });
}

// ─── RENDER ──────────────────────────────────────────────────────────[...]
function render() {
  const filtered = getFiltered();
  document.getElementById('stat-showing').textContent = filtered.length;

  const results = document.getElementById('results');

  if (filtered.length === 0) {
    results.innerHTML = '<div class="empty">No databases match your search. Try different terms.</div>';
    document.getElementById('page-footer').textContent = '';
    return;
  }

  // Group by field
  const groups = {};
  filtered.forEach(db => {
    if (!groups[db.field]) groups[db.field] = [];
    groups[db.field].push(db);
  });

  let html = '';

  Object.entries(groups).forEach(([field, dbs]) => {
    const c = fieldColors[field] || {accent:'#666', dot:'#666', rgb:'102,102,102'};

    html += `<div class="field-group">`;
    html += `<div class="field-header">
      <div class="field-dot-large" style="background:${c.dot}"></div>
      <h2 class="field-name" style="color:${c.accent}">${field}</h2>
      <div class="field-count">${dbs.length}</div>
      <div class="field-line" style="background:linear-gradient(90deg,rgba(${c.rgb},0.2),transparent)"></div>
    </div>`;

    html += `<div class="${viewMode === 'grid' ? 'db-grid' : 'db-list'}">`;

    dbs.forEach(db => {
      const badge = accessBadge[db.access] || accessBadge['Free'];
      const isSelected = selectedId === db.id;
      const cardStyle = isSelected
        ? `border-color:rgba(${c.rgb},0.35);background:rgba(${c.rgb},0.06)`
        : '';

      let linkColor = c.accent;

      html += `<div class="db-card${isSelected ? ' selected' : ''}" style="${cardStyle}" data-id="${db.id}">`;

      if (viewMode === 'list') {
        // List: left column for name/subfield, right for detail
        html += `<div class="card-left">
          <div class="card-top">
            <div>
              <div class="card-name">${db.name}</div>
              <div class="card-subfield">${db.subfield}</div>
            </div>
            <span class="badge ${badge.cls}">${badge.label}</span>
          </div>
        </div>
        <div class="card-right">
          <div class="card-detail" style="display:${isSelected ? 'block' : 'none'}">
            <p class="card-desc">${db.description}</p>
            <div class="card-org">Org: ${db.org || 'N/A'}</div>
            <a class="card-link" href="${db.url}" target="_blank" rel="noopener"
              style="color:${linkColor};border-color:rgba(${c.rgb},0.3);background:rgba(${c.rgb},0.07)"
              onclick="event.stopPropagation()">↗ Visit Database</a>
            <div class="card-tags">${db.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          </div>
          ${!isSelected ? `<div class="expand-hint">Click to expand ↓</div>` : ''}
        </div>`;
      } else {
        // Grid
        html += `<div class="card-top">
          <div>
            <div class="card-name">${db.name}</div>
            <div class="card-subfield">${db.subfield}</div>
          </div>
          <span class="badge ${badge.cls}">${badge.label}</span>
        </div>
        <div class="card-detail">
          <p class="card-desc">${db.description}</p>
          <div class="card-org">Org: ${db.org || 'N/A'}</div>
          <a class="card-link" href="${db.url}" target="_blank" rel="noopener"
            style="color:${linkColor};border-color:rgba(${c.rgb},0.3);background:rgba(${c.rgb},0.07)"
            onclick="event.stopPropagation()">↗ Visit Database</a>
        </div>
        <div class="card-tags">${db.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${!isSelected ? `<div class="expand-hint">Click to expand ↓</div>` : ''}`;
      }

      html += `</div>`; // .db-card
    });

    html += `</div></div>`; // .db-grid/.db-list, .field-group
  });

  results.innerHTML = html;

  // Attach click handlers
  results.querySelectorAll('.db-card').forEach(card => {
    card.addEventListener('click', () => {
      const id = parseInt(card.dataset.id);
      selectedId = selectedId === id ? null : id;
      render();
    });
  });

  // Footer
  document.getElementById('page-footer').textContent =
    `${filtered.length} of ${databases.length} databases · ${fields.length} disciplines · last updated 2026`;
}

// ─── INITIAL RENDER ──────────────────────────────────────────────────────[...]
render();
</script>

</body>
</html>
